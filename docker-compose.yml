services:
  laminas:
    build: .
    container_name: mini_erp_app
    ports:
     - "8080:80"
    volumes:
     - .:/var/www
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: mini_erp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_erp_laminas
      MYSQL_USER: laminas
      MYSQL_PASSWORD: laminas
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: